name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla_assistant:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'recheck' ||
       github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-document: 'https://github.com/Al-Saint/replbridge/blob/main/.github/cla.md'
          path-to-signatures: 'signatures/version1/cla.json'
          branch: 'main'
          allowlist: Al-Saint
          lock-pullrequest-aftermerge: false
          signed-commit-message: ':memo: $contributorName has signed the CLA in #$pullRequestNo'
          custom-notsigned-prcomment: |
            Thank you for your contribution to ReplBridge! Before your PR can be merged, you must sign our **Contributor License Agreement (CLA)**.

            Please read the CLA at: https://github.com/Al-Saint/replbridge/blob/main/.github/cla.md

            To sign the CLA, please reply to this comment with:
            ```
            I have read the CLA Document and I hereby sign the CLA
            ```
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
